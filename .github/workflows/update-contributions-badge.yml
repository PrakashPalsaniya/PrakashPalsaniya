name: Update Total Contributions Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute lifetime total contributions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="PrakashPalsaniya"
          START_YEAR=2023
          CURRENT_YEAR=$(date +%Y)
          TOTAL=0

          for YEAR in $(seq $START_YEAR $CURRENT_YEAR); do
            FROM="${YEAR}-01-01T00:00:00Z"
            TO="${YEAR}-12-31T23:59:59Z"
            QUERY=$(jq -n --arg u "$USERNAME" --arg f "$FROM" --arg t "$TO" \
              '{query:"query($userName:String!,$from:DateTime!,$to:DateTime!){user(login:$userName){contributionsCollection(from:$from,to:$to){contributionCalendar{totalContributions}}}}",variables:{userName:$u,from:$f,to:$t}}')

            YEAR_TOTAL=$(curl -s -H "Authorization: bearer $GH_TOKEN" -H "Content-Type: application/json" \
              -d "$QUERY" https://api.github.com/graphql \
              | jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')

            TOTAL=$((TOTAL + YEAR_TOTAL))
          done

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Generate matching-theme SVG card
        run: |
          cat > contributions-badge.svg << EOF
          <svg width="600" height="170" viewBox="0 0 600 170" xmlns="http://www.w3.org/2000/svg">
            <rect width="600" height="170" rx="10" ry="10" fill="#282a36" stroke="#43436a" stroke-width="1"/>
            <text x="300" y="82" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="52" font-weight="700" fill="#ff79c6" text-anchor="middle">${TOTAL}</text>
            <text x="300" y="115" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="19" fill="#ff79c6" text-anchor="middle">Total Contributions</text>
            <text x="300" y="142" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" fill="#f8f8f2" text-anchor="middle">Nov 6, 2023 - Present</text>
          </svg>
          EOF

      - name: Commit badge file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contributions-badge.svg
          git rm -f contributions-badge.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update total contributions card"
          git push
